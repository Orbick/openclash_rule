custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]🎥 流媒体解锁`[]🔯🇺🇸 美国故转`[]🔯🇭🇰 香港故转`[]🇭🇰 香港节点`[]🇺🇲 美国节点
custom_proxy_group=🎞️ 国内媒体`select`[]DIRECT`[]🚀 节点选择`[]🐸 手动切换
