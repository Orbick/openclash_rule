custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]🔯🇭🇰 香港故转`[]🔯🇸🇬 新加坡故转`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点
custom_proxy_group=🍀 Google`select`[]🚀 节点选择`[]🔯🇺🇸 美国故转`[]🔯🇭🇰 香港故转`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=👨🏿‍💻 GitHub`select`[]🚀 节点选择`[]🔯🇺🇸 美国故转`[]🔯🇭🇰 香港故转`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🪟 Microsoft`select`[]🚀 节点选择`[]🔯🇺🇸 美国故转`[]🔯🇭🇰 香港故转`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 节点选择`[]🔯🇺🇸 美国故转`[]🇺🇲 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🎮 游戏平台`select`[]🎮 游戏专线`[]🇰🇷 韩国节点`[]🇯🇵 日本节点`[]🔯🇺🇸 美国故转`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🐬 OneDrive`select`[]🚀 节点选择`[]🔯🇺🇸 美国故转`[]🔯🇭🇰 香港故转`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]DIRECT
