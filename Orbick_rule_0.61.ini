;策略组定义
;============================================================
; 1. 【核心调度】总闸：扁平化处理，不选大组，直接选小组
;============================================================
custom_proxy_group=🚀 节点选择`select`[]🔯🇭🇰 香港故转`[]🔯🇯🇵 日本故转`[]🔯🇺🇸 美国故转`[]🔯🇸🇬 新加坡故转`[]🔯🇹🇼 台湾故转`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇲 美国节点`[]🇹🇼 台湾节点`[]🤖 AI特供节点`[]🎥 流媒体解锁`[]🎮 游戏专线`[]🌐 其他地区`[]🏡 家宽节点`[]🛩️ 高速节点`[]🕊️ 便宜节点`[]🐸 手动切换`[]DIRECT

;============================================================
; 2. 【大组：分类文件夹】保留嵌套结构，方便在面板查看
;============================================================
; 应用总揽组
custom_proxy_group=🛠️ 业务应用总揽`select`[]📹 YouTube`[]🤖 AI`[]🎥 Netflix`[]📲 Telegram`[]🍀 Google`[]👨🏿‍💻 GitHub`[]🪟 Microsoft`[]🍎 Apple`[]🎮 游戏平台`[]💧 Copilot`[]🐬 OneDrive
; 地区总揽组
custom_proxy_group=🗺️ 全球地区总揽`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇲 美国节点`[]🇹🇼 台湾节点`[]🇰🇷 韩国节点`[]🇬🇧 英国节点`[]🇩🇪 德国节点`[]🇷🇺 俄罗斯节点`[]🇨🇦 加拿大节点`[]🌐 其他地区
; 优选总揽组
custom_proxy_group=⚡ 自动优选总揽`select`[]🔯🇭🇰 香港故转`[]🔯🇯🇵 日本故转`[]🔯🇺🇸 美国故转`[]🔯🇸🇬 新加坡故转`[]🔯🇹🇼 台湾故转`[]♻️ 全球测速

;============================================================
