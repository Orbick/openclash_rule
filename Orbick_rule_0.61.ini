custom_proxy_group=🤖 AI`select`[]🤖 AI特供节点`[]🔯🇺🇸 美国故转`[]🇺🇲 美国节点`[]🔯🇯🇵 日本故转`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇬🇧 英国节点`[]🇩🇪 德国节点`[]🐸 手动切换
custom_proxy_group=💧 Copilot`select`[]🔯🇺🇸 美国故转`[]🤖 AI特供节点`[]🇺🇲 美国节点`[]🔯🇯🇵 日本故转`[]🇯🇵 日本节点`[]🇬🇧 英国节点`[]🇩🇪 德国节点`[]🚀 节点选择
