custom_proxy_group=🛡️ 隐私防护`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港节点

;============================================================
; 4. 【底层资源池：故障切换】(🔯 + 旗帜)
;============================================================
custom_proxy_group=🔯🇭🇰 香港故转`fallback`(?=.*(香港|HK|Hong Kong|🇭🇰)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯🇯🇵 日本故转`fallback`(?=.*(日本|JP|Japan|🇯🇵)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯🇺🇸 美国故转`fallback`(?=.*(美|US|United States|🇺🇸)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯🇸🇬 新加坡故转`fallback`(?=.*(新加坡|SG|Singapore|🇸🇬)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯🇹🇼 台湾故转`fallback`(?=.*(台湾|TW|Taiwan|🇹🇼)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ 全球测速`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;============================================================
; 5. 【底层资源池：地区分类】
;============================================================
