;============================================================
; 6. 【底层资源池：功能分类】
;============================================================
custom_proxy_group=🤖 AI特供节点`select`(?=.*(AI|GPT|ChatGPT|OpenAI)).*
custom_proxy_group=🎥 流媒体解锁`select`(?=.*(流媒体|解锁|NF|Netflix|Media)).*
custom_proxy_group=🎮 游戏专线`select`(?=.*(游戏|Game|专线|延迟|IEPL|IPLC)).*
custom_proxy_group=🏡 家宽节点`select`(?=.*(家宽|家庭|原生|Residential|Native)).*
