; 2. 【核心总闸】置顶 (已删除游戏专线，避免报错)
;============================================================
custom_proxy_group=🚀 节点选择`select`[]⚡️🇭🇰 香港优选`[]⚡️🇹🇼 台湾优选`[]🔯🇭🇰 香港故转`[]🔯🇹🇼 台湾故转`[]🔯🇯🇵 日本故转`[]🔯🇺🇸 美国故转`[]🔯🇸🇬 新加坡故转`[]🧠 AI 算力`[]🍿 影音解锁`[]🚄 高速专线`[]🐸 手动切换`[]DIRECT

;============================================================
; 3. 【测速与切换组】
;============================================================
custom_proxy_group=⚡️🇭🇰 香港优选`url-test`(?=.*(香港|HK|Hong Kong|🇭🇰)).*`https://cp.cloudflare.com/generate_204`120,,50
custom_proxy_group=⚡️🇹🇼 台湾优选`url-test`(?=.*(台湾|TW|Taiwan|🇹🇼)).*`https://cp.cloudflare.com/generate_204`120,,50
custom_proxy_group=🔯🇭🇰 香港故转`fallback`(?=.*(香港|HK|Hong Kong|🇭🇰)).*`https://www.google.com/generate_204`300,,50
custom_proxy_group=🔯🇹🇼 台湾故转`fallback`(?=.*(台湾|TW|Taiwan|🇹🇼)).*`https://www.google.com/generate_204`300,,50
custom_proxy_group=🔯🇯🇵 日本故转`fallback`(?=.*(日本|JP|Japan|🇯🇵)).*`https://www.google.com/generate_204`300,,50
custom_proxy_group=🔯🇺🇸 美国故转`fallback`(?=.*(美|US|United States|🇺🇸)).*`https://www.google.com/generate_204`300,,50
custom_proxy_group=🔯🇸🇬 新加坡故转`fallback`(?=.*(新加坡|SG|Singapore|🇸🇬)).*`https://www.google.com/generate_204`300,,50

